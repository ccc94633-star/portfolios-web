<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <rect width="80" height="80" rx="16" fill="#FFF8F2"/>
  <rect x="1" y="1" width="78" height="78" rx="15" fill="none" stroke="#F0C890" stroke-width="1"/>
  <!-- Floppy ears (drawn first, behind head) -->
  <path d="M28,22 Q10,28 12,44 Q14,54 28,50" fill="none" stroke="#A05010" stroke-width="2" stroke-linecap="round"/>
  <path d="M52,22 Q70,28 68,44 Q66,54 52,50" fill="none" stroke="#A05010" stroke-width="2" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="40" cy="33" r="15" fill="none" stroke="#A05010" stroke-width="2"/>
  <!-- Eyes (filled with highlight) -->
  <circle cx="33" cy="30" r="2.5" fill="#A05010"/>
  <circle cx="47" cy="30" r="2.5" fill="#A05010"/>
  <circle cx="34" cy="29" r="1" fill="#FFF8F2"/>
  <circle cx="48" cy="29" r="1" fill="#FFF8F2"/>
  <!-- Nose -->
  <ellipse cx="40" cy="37" rx="3.5" ry="2.5" fill="#A05010"/>
  <!-- Mouth / smile -->
  <path d="M36,40 Q40,44 44,40" fill="none" stroke="#A05010" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tongue -->
  <path d="M38,43 Q40,48 42,43" fill="none" stroke="#F0C890" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <circle cx="29" cy="36" r="3" fill="none" stroke="#F0C890" stroke-width="1.2"/>
  <circle cx="51" cy="36" r="3" fill="none" stroke="#F0C890" stroke-width="1.2"/>
  <text x="40" y="66" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle" fill="#A05010">喜歡動物</text>
</svg>
