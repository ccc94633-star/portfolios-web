  <!-- Accent strips -->
  <line x1="32" y1="22" x2="32" y2="50" stroke="#F5C060" stroke-width="1"/>
  <line x1="48" y1="22" x2="48" y2="50" stroke="#F5C060" stroke-width="1"/>
  <!-- Wheels -->
  <circle cx="28" cy="53" r="3" fill="none" stroke="#C87020" stroke-width="1.5"/>
  <circle cx="52" cy="53" r="3" fill="none" stroke="#C87020" stroke-width="1.5"/>
  <text x="40" y="66" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle" fill="#C87020">熱愛旅遊</text>
